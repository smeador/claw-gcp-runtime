services:
  openclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: agent-lab-openclaw:cloud
    environment:
      OPENCLAW_WORKSPACE: /workspace
      OPENCLAW_CONFIG_SOURCE: /runtime/openclaw.json
    volumes:
      - ../workspace:/workspace:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/home:/home/node/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/runtime:/runtime:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/workspace:/workspace/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/memory:/workspace/memory
    ports:
      - "127.0.0.1:18789:18789"
    command: ["gateway"]
    restart: unless-stopped

  openclaw-cli:
    image: agent-lab-openclaw:cloud
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_started
    environment:
      OPENCLAW_WORKSPACE: /workspace
      OPENCLAW_CONFIG_SOURCE: /runtime/openclaw.json
    volumes:
      - ../workspace:/workspace:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/home:/home/node/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/runtime:/runtime:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/workspace:/workspace/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/memory:/workspace/memory
    entrypoint: ["/usr/bin/tini", "--", "agent-lab-openclaw-entrypoint"]
    command: ["status"]
    profiles: ["cli"]
