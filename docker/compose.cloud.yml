services:
  openclaw-gateway:
    env_file:
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/runtime/runtime.env
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE}
        NODE_IMAGE: ${NODE_IMAGE}
        GOG_VERSION: ${GOG_VERSION}
        OPENCLAW_NPM_DIST_TAG: ${OPENCLAW_NPM_DIST_TAG}
    image: agent-lab-openclaw:cloud
    environment:
      OPENCLAW_WORKSPACE: /workspace
      OPENCLAW_CONFIG_SOURCE: /runtime/openclaw.json
      GOG_ACCOUNT: ${GOG_ACCOUNT:-automation@example.com}
      GOG_SERVICE_ACCOUNT_KEY_SOURCE: /runtime/gog-service-account.json
    volumes:
      - ../workspace:/workspace:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/home:/home/node/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/runtime:/runtime:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/workspace:/workspace/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/memory:/workspace/memory
    ports:
      - "127.0.0.1:18789:18789"
    command: ["gateway"]
    restart: unless-stopped

  openclaw-cli:
    env_file:
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/runtime/runtime.env
    image: agent-lab-openclaw:cloud
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE}
        NODE_IMAGE: ${NODE_IMAGE}
        GOG_VERSION: ${GOG_VERSION}
        OPENCLAW_NPM_DIST_TAG: ${OPENCLAW_NPM_DIST_TAG}
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_started
    environment:
      OPENCLAW_WORKSPACE: /workspace
      OPENCLAW_CONFIG_SOURCE: /runtime/openclaw.json
      GOG_ACCOUNT: ${GOG_ACCOUNT:-automation@example.com}
      GOG_SERVICE_ACCOUNT_KEY_SOURCE: /runtime/gog-service-account.json
    volumes:
      - ../workspace:/workspace:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/home:/home/node/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/runtime:/runtime:ro
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/workspace:/workspace/.openclaw
      - ${OPENCLAW_DEPLOY_ROOT:-/opt/openclaw}/state/memory:/workspace/memory
    entrypoint: ["/usr/bin/tini", "--", "agent-lab-openclaw-entrypoint"]
    command: ["status"]
    profiles: ["cli"]
