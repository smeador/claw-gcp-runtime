services:
  openclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE}
        NODE_IMAGE: ${NODE_IMAGE}
        GOG_VERSION: ${GOG_VERSION}
        OPENCLAW_NPM_DIST_TAG: ${OPENCLAW_NPM_DIST_TAG}
    image: agent-lab-openclaw:local
    env_file:
      - ../config/docker.local.env
    environment:
      OPENCLAW_WORKSPACE: /workspace
      OPENCLAW_CONFIG_SOURCE: /runtime/openclaw.json
      GOG_ACCOUNT: ${GOG_ACCOUNT:-automation@example.com}
      GOG_SERVICE_ACCOUNT_KEY_SOURCE: /runtime/gog-service-account.json
    volumes:
      - ../workspace:/workspace:ro
      - ../config/rendered:/runtime:ro
      - openclaw_home_local:/home/node/.openclaw
      - openclaw_workspace_state_local:/workspace/.openclaw
      - ../workspace/.tmp:/workspace/.tmp
      - openclaw_memory_local:/workspace/memory
    ports:
      - "127.0.0.1:18790:18789"
    command: ["gateway"]
    restart: unless-stopped

  openclaw-cli:
    image: agent-lab-openclaw:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE}
        NODE_IMAGE: ${NODE_IMAGE}
        GOG_VERSION: ${GOG_VERSION}
        OPENCLAW_NPM_DIST_TAG: ${OPENCLAW_NPM_DIST_TAG}
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_started
    env_file:
      - ../config/docker.local.env
    environment:
      OPENCLAW_WORKSPACE: /workspace
      OPENCLAW_CONFIG_SOURCE: /runtime/openclaw.json
      GOG_ACCOUNT: ${GOG_ACCOUNT:-automation@example.com}
      GOG_SERVICE_ACCOUNT_KEY_SOURCE: /runtime/gog-service-account.json
    volumes:
      - ../workspace:/workspace:ro
      - ../config/rendered:/runtime:ro
      - openclaw_home_local:/home/node/.openclaw
      - openclaw_workspace_state_local:/workspace/.openclaw
      - ../workspace/.tmp:/workspace/.tmp
      - openclaw_memory_local:/workspace/memory
    entrypoint: ["/usr/bin/tini", "--", "agent-lab-openclaw-entrypoint"]
    command: ["status"]
    profiles: ["cli"]

  openclaw-dev:
    image: agent-lab-openclaw:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE}
        NODE_IMAGE: ${NODE_IMAGE}
        GOG_VERSION: ${GOG_VERSION}
        OPENCLAW_NPM_DIST_TAG: ${OPENCLAW_NPM_DIST_TAG}
    user: root
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_started
    env_file:
      - ../config/docker.local.env
    environment:
      OPENCLAW_WORKSPACE: /workspace
      OPENCLAW_CONFIG_SOURCE: /runtime/openclaw.json
      GOG_ACCOUNT: ${GOG_ACCOUNT:-automation@example.com}
      GOG_SERVICE_ACCOUNT_KEY_SOURCE: /runtime/gog-service-account.json
    volumes:
      - ..:/repo
      - ../workspace:/workspace
      - ../config/rendered:/runtime
      - openclaw_home_local:/home/node/.openclaw
      - openclaw_workspace_state_local:/workspace/.openclaw
      - ../workspace/.tmp:/workspace/.tmp
      - openclaw_memory_local:/workspace/memory
    entrypoint: ["/bin/bash", "-lc"]
    command: ["sleep infinity"]

volumes:
  openclaw_home_local:
  openclaw_workspace_state_local:
  openclaw_memory_local:
